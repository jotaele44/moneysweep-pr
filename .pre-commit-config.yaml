repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        name: gitleaks
        description: Scan for secrets using gitleaks
        entry: gitleaks detect --source git -v
        language: golang
        pass_filenames: false
        always_run: true
        stages: [commit]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: detect-private-key
        name: Detect private keys
        description: Detect presence of private keys
        entry: detect-private-key
        language: python
        types: [text]

  - repo: local
    hooks:
      - id: regenerate-registry-json
        name: Regenerate registries/*.json from YAML (audit Phase 2)
        # Runs only when a registry YAML changes. The script overwrites the
        # paired JSON, which then gets re-staged via post-hook. See
        # registries/README.md for the YAML-as-source-of-truth policy.
        entry: python3 scripts/regenerate_registry_json.py
        language: system
        pass_filenames: false
        files: ^registries/.*\.yaml$
        stages: [commit]
