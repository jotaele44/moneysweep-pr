repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        name: gitleaks
        description: Scan for secrets using gitleaks
        entry: gitleaks detect --source git -v
        language: golang
        pass_filenames: false
        always_run: true
        stages: [commit]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: detect-private-key
        name: Detect private keys
        description: Detect presence of private keys
        entry: detect-private-key
        language: python
        types: [text]

  - repo: local
    hooks:
      - id: regenerate-registry-json
        name: Regenerate registries/*.json from YAML (audit Phase 2)
        # Runs only when a registry YAML changes. The script overwrites the
        # paired JSON; runtime modules under contract_sweeper.runtime.* read the
        # JSON, so this hook is what keeps the wire format in sync with the
        # YAML source of truth. See registries/README.md for the policy.
        entry: python3 scripts/regenerate_registry_json.py
        language: system
        pass_filenames: false
        files: ^registries/.*\.yaml$
        stages: [commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        name: ruff (lint, changed files)
        # Lints only the files in the commit, so the repo-wide backlog (cleaned up
        # incrementally per docs/BUILD_EXECUTION_SEQUENCE.md Wave B) does not block
        # unrelated commits. Keep `rev` in sync with ruff in requirements-dev.txt.
        # No --fix here: surface issues, let the author decide.
        args: [--no-fix]
      - id: ruff-format
        name: ruff format (changed files)
        # The repo-wide reformat landed in Wave C; this keeps changed files
        # formatted. The CI `ruff format --check .` job is the gating counterpart.

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        name: mypy (narrow-scope gate, runtime/ only)
        # Audit #10 — INTENTIONALLY BLOCKING within a narrow scope. The hook
        # fails the commit if mypy reports any error in a changed file under
        # contract_sweeper/runtime/. The audit recommendation originally read
        # "non-blocking start"; this hook implements that as "blocking on a
        # narrow surface" rather than "report-only everywhere" because a
        # pre-commit hook that never blocks is just noise (the existing
        # .github/workflows/mypy.yml is already the report-only counterpart).
        # Widen `files:` as more code becomes type-clean.
        #
        # `--ignore-missing-imports` keeps third-party stubs (pandas, requests)
        # from blocking. `--no-strict-optional` matches the existing code style.
        args:
          - --ignore-missing-imports
          - --no-strict-optional
          - --follow-imports=silent
        files: ^contract_sweeper/runtime/
        pass_filenames: true
        additional_dependencies:
          - types-PyYAML
