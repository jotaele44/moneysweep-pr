    notes: |
      ACT transition manual export lists LPC & D and LPC Contractors as the
      same vendor across different filing years. The dot-and-space spelling
      forms ("L. P. C. and D. Inc.", "L.P.C. & D., INC.") appear throughout
      the ACT 2020 transition PDF and normalize to "L P C ..." rather than
      "LPC ..." under the default normalizer — so they need explicit
      override entries even though they look obviously equivalent.
      Source registry note for act_transition_contracts
      (source_registry.yaml line 257) explicitly names LPC&D.
    evidence: "registries/source_registry.yaml:act_transition_contracts;reports/act_2020_alias_audit.md"

