# Curated canonical-name overrides for entity clustering.
#
# Each entry forces all listed aliases (after default normalization via
# moneysweep.runtime.name_normalization.normalize_name) to collapse
# into the same canonical group. Use this only for cases where the default
# normalizer cannot bridge the variants — e.g. structural rebrands, shared
# subsidiaries, or PR-specific spelling variants.
#
# canonical_name      Display form used for the merged cluster.
# aliases             Raw observed names (case-insensitive, punctuation insensitive).
# canonical_uei       Optional UEI of the canonical legal entity, when known.
# parent_canonical    Optional canonical_name of the parent group; used to
#                     express subsidiary → parent relationships without
#                     forcing a parent merge.
# notes               Free text rationale.
# evidence            Source filename or document sha256 (from
#                     data/raw/documents/documents_manifest.csv) supporting
#                     the equivalence. Required for audit.
#
# Identity warning: these are operator-curated equivalences, not legal
# identity assertions. Downstream consumers must still respect the
# CLAIM_LANGUAGE_POLICY tiering.

