    update_cadence: monthly
    notes: |
      EIA Open Data v2 power-sector time-series (net generation, capacity,
      consumption) for Puerto Rico, per registries/eia_series.yaml. Requires a
      free EIA_API_KEY (https://www.eia.gov/opendata/register.php). Supplements
      PREPA/LUMA operational monitoring.

