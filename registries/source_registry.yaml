    update_cadence: monthly
    notes: |
      FRED (St. Louis Fed) economic time-series for Puerto Rico indicators
      (employment, prices, income, etc.), per registries/fred_series.yaml.
      Requires a free FRED_API_KEY
      (https://fred.stlouisfed.org/docs/api/api_key.html). Cross-references
