    update_cadence: weekly
    notes: FSRS prime-to-sub reporting. Joins with USAspending subaward stream.

  - source_id: sam_entities
    family: entity_resolution
    required: true
    authentication: api_key:SAM_API_KEY
    endpoint_url: https://sam.gov/data-services/Entity%20Information
    producer_script: scripts/sam_enrichment.py
    expected_outputs:
      - data/staging/processed/enrichment/vendor_uei_index.csv
      - data/staging/processed/entities_resolved.csv
    schema_version: r5_v1
    validation_threshold:
      min_rows: 1
      # PR2.6: global parent_uei_coverage_pct ≥ 0.90 is replaced by entity-type-aware
      # gates in validation_gates.py (corporate_parent_uei_rate ≥ 0.002).
      # PR awards are dominated by PR govt agencies that never register corporate
      # parent UEIs — a global 0.90 threshold is structurally unachievable.
      parent_uei_coverage_pct_govt: 0.00   # govt entities: no corporate parent expected
      parent_uei_coverage_pct_corporate: 0.002  # corporate entities: canary threshold
    update_cadence: monthly
    notes: |
      SAM full extract + per-UEI enrichment for parent resolution.
      Supplemented by scripts/usaspending_parent_uei_extract.py (no rate limit).
      SAM API rate: 1,000 req/day → full 2,334-UEI run = 2.3+ days.

