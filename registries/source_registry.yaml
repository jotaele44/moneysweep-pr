version: "1.0"
schema_version: "r5_source_registry_v1"

# Source registry for the Puerto Rico contract / funding / lobbying / infrastructure / political-finance ecosystem.
#
# Families:
#   federal           — federal awards, grants, contracts, subawards
#   territorial       — PR government agencies, authorities, transition contracts
#   municipal         — PR municipality records
#   lobbying          — LDA + PR cabilderos
#   political_finance — FEC, PR electoral donations, Follow-the-Money
#   infrastructure    — PRASA, PREPA/LUMA/Genera, USACE, EPA permits
#   bonds             — EMMA, MSRB RTRS
#   entity_resolution — SAM, OpenCorporates, DCAA legacy lists
#   manual_export     — credentialed portals where only operator-supplied drops are accepted
#
# authentication: none | api_key:<ENV_VAR> | manual_export
# All API keys are read from .env (or env-equivalent). Never committed.

sources:

  # ----- Federal awards backbone -----
  - source_id: usaspending_prime
    family: federal
    required: true
    authentication: none
    endpoint_url: https://api.usaspending.gov/
    producer_script: scripts/build_unified_master.py
    expected_outputs:
      - data/staging/processed/pr_contracts_master.csv
      - data/staging/processed/pr_all_awards_master.csv
    schema_version: r5_v1
    validation_threshold:
      min_rows: 1
      year_coverage_pct: 0.95
      # PR2.6: no per-source parent_uei threshold — top entities are PR govt agencies.
      # Entity-type-aware gates in validation_gates.py handle parent resolution.
    update_cadence: weekly
    notes: |
      USAspending API + bulk archive. No key required.
      Top recipients are PR government agencies (PRDOH, ADSEF, PRDE, PRHA) —
      no corporate parent_uei is expected for these entities.

  - source_id: usaspending_subawards
    family: federal
    required: true
    authentication: none
    endpoint_url: https://www.usaspending.gov/download_center/award_data_archive
    producer_script: scripts/download_subawards.py
    expected_outputs:
      - data/staging/processed/pr_subawards_master.csv
      - data/staging/processed/execution/execution_chain_master.csv
    schema_version: r5_v1
    validation_threshold:
      min_rows: 1
      linkage_rate_pct: 0.90
    update_cadence: weekly

  - source_id: fpds_report_builder
    family: federal
    required: false
    authentication: none
    endpoint_url: https://www.fpds.gov/fpdsng_cms/index.php/en/reports.html
    producer_script: scripts/download_grants.py
    expected_outputs:
      - data/staging/processed/pr_fpds_report_builder.csv
    schema_version: r5_v1
    validation_threshold:
      min_rows: 1
    update_cadence: quarterly
    notes: FPDS Report Builder FY2018-2024 ingestion. Supplements USAspending.

  - source_id: fsrs_subawards
    family: federal
    required: true
    authentication: none
    endpoint_url: https://www.fsrs.gov/
    producer_script: scripts/download_fsrs.py
    expected_outputs:
      - data/staging/processed/pr_fsrs_subawards.csv
    schema_version: r5_v1
    validation_threshold:
      min_rows: 1
      linkage_rate_pct: 0.85
    update_cadence: weekly
    notes: FSRS prime-to-sub reporting. Joins with USAspending subaward stream.

  - source_id: sam_entities
    family: entity_resolution
    required: true
    authentication: api_key:SAM_API_KEY
    endpoint_url: https://sam.gov/data-services/Entity%20Information
    producer_script: scripts/sam_enrichment.py
    expected_outputs:
      - data/staging/processed/enrichment/vendor_uei_index.csv
      - data/staging/processed/entities_resolved.csv
    schema_version: r5_v1
    validation_threshold:
      min_rows: 1
      # PR2.6: global parent_uei_coverage_pct ≥ 0.90 is replaced by entity-type-aware
      # gates in validation_gates.py (corporate_parent_uei_rate ≥ 0.002).
      # PR awards are dominated by PR govt agencies that never register corporate
      # parent UEIs — a global 0.90 threshold is structurally unachievable.
      parent_uei_coverage_pct_govt: 0.00   # govt entities: no corporate parent expected
      parent_uei_coverage_pct_corporate: 0.002  # corporate entities: canary threshold
    update_cadence: monthly
    notes: |
      SAM full extract + per-UEI enrichment for parent resolution.
      Supplemented by scripts/usaspending_parent_uei_extract.py (no rate limit).
      SAM API rate: 1,000 req/day → full 2,334-UEI run = 2.3+ days.

  - source_id: highergov_supplemental
    family: federal
    required: false
