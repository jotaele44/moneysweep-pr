# FRED PR macro time-series catalog
# -----------------------------------------------------------------------------
# Consumed by scripts/download_fred.py. Each entry resolves to one FRED API
# request against /fred/series/observations?series_id=<id>.
#
# To add a series: append an entry. To remove one: delete it.
#
# Catalog candidates use widely-published PR-specific FRED series IDs.
# Series whose IDs have been renamed or retired will surface as 0 rows in the
# per-series summary — edit this file to adjust. The fetcher tolerates
# per-series failures (logs and continues).
#
# FRED API reference:
#   - https://fred.stlouisfed.org/docs/api/fred/series_observations.html
#   - Browse PR series: https://fred.stlouisfed.org/searchresults/?st=puerto+rico

api_version: v1
base_url: https://api.stlouisfed.org/fred
default_start: "1990-01-01"
# default_end omitted — FRED returns up to the latest observation

series:
  # -------- Labor market --------
  - series_id: PRUR
    description: "Puerto Rico unemployment rate (%, monthly, NSA)"
    units: percent
    frequency: monthly

  - series_id: PRNA
    description: "Puerto Rico all employees, total nonfarm (thousands, monthly, NSA)"
    units: thousands of persons
    frequency: monthly

  - series_id: PRMFG
    description: "Puerto Rico all employees, manufacturing (thousands, monthly, NSA)"
    units: thousands of persons
    frequency: monthly

  - series_id: PRLF
    description: "Puerto Rico civilian labor force (thousands, monthly, NSA)"
    units: thousands of persons
    frequency: monthly

  - series_id: PRCONS
    description: "Puerto Rico all employees, construction (thousands, monthly, NSA)"
    units: thousands of persons
    frequency: monthly

  # -------- Output / GDP --------
  - series_id: RGMP72060
    description: "Real GDP, San Juan-Carolina-Caguas, PR MSA (annual, chained dollars)"
    units: millions of chained 2017 dollars
    frequency: annual

  - series_id: PRRGSP
    description: "Real gross state product, Puerto Rico (annual)"
    units: millions of chained dollars
    frequency: annual

  # -------- Housing --------
  - series_id: PRSTHPI
    description: "Puerto Rico house price index (quarterly, NSA, 1980=100)"
    units: index 1980 q1 = 100
    frequency: quarterly

  - series_id: PRBPPRIV
    description: "Puerto Rico new private housing units authorized by building permits (monthly, NSA)"
    units: units
    frequency: monthly

  # -------- Income / demographic --------
  - series_id: RPIPR
    description: "Real per capita personal income, Puerto Rico (annual)"
    units: chained 2017 dollars
    frequency: annual

  - series_id: PRPOPL
    description: "Resident population, Puerto Rico (annual, thousands)"
    units: thousands of persons
    frequency: annual

  - series_id: STTMINWGPR
    description: "Puerto Rico state minimum wage (annual, $/hr)"
    units: dollars per hour
    frequency: annual
