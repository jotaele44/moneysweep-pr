# FRED PR macro time-series catalog
# -----------------------------------------------------------------------------
# Consumed by scripts/download_fred.py. Each entry resolves to one FRED API
# request against /fred/series/observations?series_id=<id>.
#
# To add a series: append an entry. To remove one: delete it.
#
# IMPORTANT: every id here must be a real FRED series. download_fred.py now
# fails the whole refresh (status PARTIAL_FAILURE, prior CSV preserved) if any
# series errors, so a bogus id breaks the producer rather than silently
# yielding 0 rows. Verify new ids resolve at
# https://fred.stlouisfed.org/series/<id> before adding.
#
# Pruned 2026-06-15 to ids confirmed to exist via the /fred/series API. Nine
# guessed ids returned HTTP 400 "series does not exist" and were removed:
# PRNA, PRMFG, PRCONS, RGMP72060, PRRGSP, PRSTHPI, PRBPPRIV, RPIPR, PRPOPL.
# Re-add output / housing / income coverage only with confirmed FRED ids.
#
# FRED API reference:
#   - https://fred.stlouisfed.org/docs/api/fred/series_observations.html
#   - Browse PR series: https://fred.stlouisfed.org/searchresults/?st=puerto+rico

api_version: v1
base_url: https://api.stlouisfed.org/fred
default_start: "1990-01-01"
# default_end omitted — FRED returns up to the latest observation

series:
  # -------- Labor market --------
  - series_id: PRUR
    description: "Puerto Rico unemployment rate (%, monthly, NSA)"
    units: percent
    frequency: monthly

  - series_id: PRLF
    description: "Puerto Rico civilian labor force (persons, monthly, SA)"
    units: persons
    frequency: monthly

  # -------- Wages --------
  - series_id: STTMINWGPR
    description: "Puerto Rico state minimum wage (annual, $/hr)"
    units: dollars per hour
    frequency: annual
