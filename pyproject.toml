[tool.mypy]
# Gradually-typed baseline. As of Wave D (docs/BUILD_EXECUTION_SEQUENCE.md) the
# contract_sweeper/ package type-checks clean and .github/workflows/mypy.yml is a
# GATING check. Tighten incrementally (drop ignore_missing_imports, add modules to
# strict) as annotations land.
python_version = "3.10"
ignore_missing_imports = true
warn_unused_ignores = false
warn_redundant_casts = true
no_implicit_optional = true
# follow_imports=silent type-checks only the listed package; modules reached by
# import (e.g. scripts/) are followed for symbols but their own errors are not
# reported yet. scripts/ is brought into scope later (sequence task 24).
follow_imports = "silent"
# Pipeline/CLI scripts are not yet annotated; focus checking on the package.
files = ["contract_sweeper"]
exclude = "(^archive/|^scripts/|tests/)"

[tool.ruff]
# Lint adoption is INTENTIONALLY NON-GATING to start (see .github/workflows/lint.yml,
# which sets continue-on-error). The current tree has a known lint backlog; it is
# cleaned up incrementally per docs/BUILD_EXECUTION_SEQUENCE.md (Wave B) before the
# CI job is flipped to blocking (Wave B, task 13). Keep the rule set here aligned
# with ruff's defaults so the measured baseline stays stable.
line-length = 100
target-version = "py310"
extend-exclude = ["archive"]

[tool.ruff.lint]
# ruff defaults: E4/E7/E9 (a safe pycodestyle subset) + F (pyflakes). Broader rule
# families (I, UP, B, …) are enabled later in the sequence once the tree is clean.
select = ["E4", "E7", "E9", "F"]

[tool.ruff.lint.per-file-ignores]
# E402 (import-not-at-top) is intentional in these files: each inserts the repo
# root into sys.path before importing first-party modules, or (in the test files)
# deliberately interleaves per-source imports between test groups for locality.
# Reordering would break the sys.path bootstrap, so the rule is suppressed here
# rather than "fixed".
"run_all.py" = ["E402"]
"scripts/run_export.py" = ["E402"]
"scripts/smoke_export.py" = ["E402"]
"scripts/build_export_streams.py" = ["E402"]
"tests/test_new_downloaders.py" = ["E402"]
"tests/test_ingest_manual_data.py" = ["E402"]
