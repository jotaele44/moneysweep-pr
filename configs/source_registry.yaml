version: 1
defaults:
  retry:
    max_attempts: 5
    base_backoff_seconds: 1.0
    max_backoff_seconds: 30.0
  pagination:
    mode: offset
    page_size: 1000
  cache:
    enabled: true
    ttl_seconds: 86400
  resume:
    enabled: true
  completeness:
    min_row_coverage: 0.95
sources:
  - id: usaspending_awards
    enabled: true
    priority: 1
    module: scripts.download_grants
    entrypoint: run
    description: USASpending non-contract federal awards for Puerto Rico
    output_paths:
      - data/staging/processed/pr_grants_master.csv
    required_fields:
      - award_id
      - recipient_name
      - obligated_amount
      - source_dataset
    supports:
      pagination: true
      retry_backoff: true
      resume: true
      cache: true
      time_window_splitting: true
      manifest: true
      completeness_logging: true

  - id: sam_entity_resolution
    enabled: true
    priority: 2
    module: scripts.sam_enrichment
    entrypoint: run
    description: SAM UEI enrichment and parent entity mapping
    output_paths:
      - data/staging/processed/enrichment/vendor_uei_index.csv
    required_fields:
      - vendor_name
      - uei
      - source
      - status
    supports:
      pagination: true
      retry_backoff: true
      resume: true
      cache: true
      time_window_splitting: true
      manifest: true
      completeness_logging: true

