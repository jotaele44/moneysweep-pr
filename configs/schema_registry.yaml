version: 1
datasets:
  - name: contracts_master
    format: parquet
    required_fields:
      - entity_id
      - parent_uei
      - normalized_name
      - award_id
      - funding_source
      - obligation_amount
      - geo_location
      - project_id
      - agency
      - source_system
      - source_url
      - source_date
      - link_confidence
      - risk_score
    optional_fields:
      - municipality
      - contract_type
      - award_status
  - name: entities_resolved
    format: csv
    required_fields:
      - entity_id
      - parent_uei
      - normalized_name
      - source_system
      - link_confidence
    optional_fields:
      - alias
      - tax_id
      - cage_code
  - name: execution_chain_master
    format: csv
    required_fields:
      - entity_id
      - project_id
      - funding_source
      - source_system
      - link_confidence
    optional_fields:
      - upstream_entity_id
      - downstream_asset_id
      - municipality
  - name: execution_chain_per_asset
    format: csv
    required_fields:
      - asset_id
      - municipality
      - funding_source
      - source_system
      - linked_contract_count
      - unique_entities
      - total_obligation
      - avg_link_confidence
      - low_confidence_count
      - coverage_ratio
    optional_fields:
      - dominant_agency
      - review_flag
  - name: financial_flows_master
    format: parquet
    required_fields:
      - flow_id
      - flow_type
      - source_system
      - funding_source
      - award_id
      - project_id
      - entity_id
      - upstream_entity_id
      - downstream_asset_id
      - municipality
      - amount_type
      - amount
      - link_confidence
    optional_fields:
      - agency
      - flow_date
      - evidence_path
