[pytest]
norecursedirs = archive
# --cov-fail-under is the coverage floor: a ratchet, not a target. Current total
# is ~44.5%; the floor sits a couple points below to lock the baseline without
# flaking on run-to-run variance. Raise it (never lower) as Wave G adds tests.
addopts = --cov=scripts --cov=contract_sweeper --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=42
markers =
    unit: pure logic tests with minimal filesystem or process coupling
    integration: multi-module or filesystem-backed behavior tests
    pipeline_gate: production, pause, recovery, blocker, or phase-gate invariant tests
    non_executing: audits, docs, configuration, validation, and status checks that do not execute source recovery
    external: tests around external source boundaries or downloader modules; included in default pytest unless explicitly filtered
    slow: long-running tests reserved for explicit selection; no tests are marked slow by default in R4.9Z-F

