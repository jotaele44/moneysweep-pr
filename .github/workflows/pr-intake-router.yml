name: PR Intake Router

on:
  push:
    paths:
      - 'shared/pr_intake_router.py'
      - 'scripts/route_pr_intake.py'
      - 'scripts/run_pr_intake_router_hook.py'
      - 'scripts/produce_pr_news_raw_intake.py'
      - 'scripts/run_pr_news_router_pipeline.py'
      - 'run_pr_intake_router.py'
      - 'run_pr_news_raw_intake.py'
      - 'run_pr_news_router_pipeline.py'
      - 'config/pr_intake_domain_router.yaml'
      - 'tests/test_pr_intake_router.py'
      - 'tests/test_route_pr_intake_cli.py'
      - 'tests/test_pr_intake_router_hook.py'
      - 'tests/test_produce_pr_news_raw_intake.py'
      - 'tests/test_pr_news_router_pipeline.py'
      - 'tests/fixtures/pr_intake_router_sample.jsonl'
      - 'tests/fixtures/pr_news_incoming_sample.jsonl'
      - '.github/workflows/pr-intake-router.yml'
  # No path filter on pull_request: router-tests is a *required* status check
  # on main, so it must report on every PR. A path-filtered required check
  # never reports on PRs that don't touch these paths, permanently blocking
  # the merge ("N of M required status checks are expected"). The push trigger
  # stays path-filtered since push runs don't gate PR merges.
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  router-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run targeted router and producer tests
        # --no-cov: this job runs a small, targeted subset, so the repo-wide
        # --cov-fail-under floor in pytest.ini does not apply here (the full
        # coverage gate lives in tests.yml). Without this the subset reports
        # ~0% total coverage and fails the inherited floor.
        run: python -m pytest tests/test_pr_intake_router.py tests/test_route_pr_intake_cli.py tests/test_pr_intake_router_hook.py tests/test_produce_pr_news_raw_intake.py tests/test_pr_news_router_pipeline.py -v --no-cov

      - name: Run router export command
        run: python run_pr_intake_router.py --input tests/fixtures/pr_intake_router_sample.jsonl --out-dir data/exports/pr_intake_router --fail-on-validation-errors

      - name: Run PR News producer-to-router handoff
        run: python run_pr_news_router_pipeline.py --incoming tests/fixtures/pr_news_incoming_sample.jsonl --raw-output data/intake/pr_news/raw_items_latest.jsonl --manifest data/intake/pr_news/raw_items_latest_manifest.json --export-dir data/exports/pr_intake_router --fail-on-validation-errors

      - name: Show routing summary
        run: cat data/exports/pr_intake_router/routing_summary.json

      - name: Show export verification
        run: cat data/exports/pr_intake_router/export_verification.json

      - name: Upload router exports
        uses: actions/upload-artifact@v7
        with:
          name: pr-intake-router-exports-py${{ matrix.python-version }}
          path: data/exports/pr_intake_router/
