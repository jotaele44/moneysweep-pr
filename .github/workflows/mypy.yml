name: Type check

# Gating: the contract_sweeper/ package type-checks clean (Wave D of
# docs/BUILD_EXECUTION_SEQUENCE.md), so mypy now blocks merges on regressions.
# Scope/strictness widen incrementally per the sequence (scripts/ is task 24).
on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run mypy
        run: python -m mypy
