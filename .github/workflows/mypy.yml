name: Type check (report-only)

# Report-only: this workflow surfaces mypy findings but never blocks a merge
# (continue-on-error). Promote to a gating check once the baseline is clean.
on: [push, pull_request]

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mypy

      - name: Run mypy (report-only)
        continue-on-error: true
        run: python -m mypy
