name: Intake Delivery (manual)

# Contract-Sweeper finance-lane normalization — SCAFFOLDING, manual-only
# (workflow_dispatch). Pipeline: PR-intake router -> finance-lane normalization ->
# same-repo PR with the finance tables.
#
# Note: the former cross-repo delivery to spiderweb-pr was retired (2026-06) when
# spiderweb-pr became a producer-only federation node and removed its
# intake-normalize receiver. This workflow no longer delivers to other repos.
# Not exercised by CI; the underlying logic lives in
# scripts/build_contract_sweeper_finance_lane.py.

on:
  workflow_dispatch:
    inputs:
      raw_intake_path:
        description: Raw intake JSONL/JSON/CSV to route
        required: false
        default: tests/fixtures/pr_intake_router_sample.jsonl

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  deliver:
    runs-on: ubuntu-latest
    env:
      RAW_PATH: ${{ inputs.raw_intake_path }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Route raw intake
        run: python3 scripts/route_pr_intake.py --input "$RAW_PATH" --out-dir data/exports/pr_intake_router
      - name: Normalize Contract-Sweeper finance lane
        run: python3 scripts/build_contract_sweeper_finance_lane.py --input data/exports/pr_intake_router --out .
      - name: Open same-repo PR with normalized finance tables
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: intake/finance-lane-update
          title: "Intake: politics/finance lane update"
          commit-message: "Intake delivery: normalized finance lane"
          body: Automated finance-lane normalization from the PR-intake router.
          add-paths: |
            data/normalized/*.csv
            data/review/*.csv
            reports/daily/politics_finance_update_report.md
