name: Intake Delivery (manual)

# Cross-repo intake delivery — SCAFFOLDING, manual-only (workflow_dispatch).
# Pipeline: PR-intake router -> Contract-Sweeper finance-lane normalization ->
# same-repo PR with the finance tables -> deliver the spiderweb-pr derivative to
# that repo's intake dropzone via a cross-repo PR.
#
# The cross-repo step needs a FEDERATION_DELIVERY_TOKEN secret: a repo-scoped PAT
# with write access to jotaele44/spiderweb-pr (the default GITHUB_TOKEN is
# single-repo). Without it, that step is skipped. This workflow is NOT exercised
# by CI; the underlying logic lives in tested scripts
# (scripts/build_contract_sweeper_finance_lane.py, scripts/deliver_derivatives.py).

on:
  workflow_dispatch:
    inputs:
      raw_intake_path:
        description: Raw intake JSONL/JSON/CSV to route
        required: false
        default: tests/fixtures/pr_intake_router_sample.jsonl

permissions:
  contents: write
  pull-requests: write

jobs:
  deliver:
    runs-on: ubuntu-latest
    env:
      RAW_PATH: ${{ inputs.raw_intake_path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Route raw intake
        run: python3 scripts/route_pr_intake.py --input "$RAW_PATH" --out-dir data/exports/pr_intake_router
      - name: Normalize Contract-Sweeper finance lane
        run: python3 scripts/build_contract_sweeper_finance_lane.py --input data/exports/pr_intake_router --out .
      - name: Open same-repo PR with normalized finance tables
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: intake/finance-lane-update
          title: "Intake: politics/finance lane update"
          commit-message: "Intake delivery: normalized finance lane"
          body: Automated finance-lane normalization from the PR-intake router.
          add-paths: |
            data/normalized/*.csv
            data/review/*.csv
            reports/daily/politics_finance_update_report.md
      - name: Deliver to spiderweb-pr (cross-repo PR; needs FEDERATION_DELIVERY_TOKEN)
        if: ${{ secrets.FEDERATION_DELIVERY_TOKEN != '' }}
        env:
          DELIVERY_TOKEN: ${{ secrets.FEDERATION_DELIVERY_TOKEN }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -e
          git clone --depth 1 "https://x-access-token:${DELIVERY_TOKEN}@github.com/jotaele44/spiderweb-pr.git" /tmp/spiderweb-pr
          python3 scripts/deliver_derivatives.py --derivatives-dir data/exports/pr_intake_router --dropzone /tmp/spiderweb-pr/data/intake/pr_intake
          cd /tmp/spiderweb-pr
          BRANCH="intake/spiderweb-derivatives-${RUN_ID}"
          git config user.name "prii-federation-bot"
          git config user.email "prii-federation-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/intake/pr_intake/spiderweb_pr_derivatives.csv
          git commit -m "Intake delivery: spiderweb_pr derivatives from Contract-Sweeper router"
          git push origin "$BRANCH"
          GH_TOKEN="$DELIVERY_TOKEN" gh pr create --repo jotaele44/spiderweb-pr --head "$BRANCH" --base main \
            --title "Intake delivery: spiderweb spatial lane derivatives" \
            --body "Automated cross-repo delivery from the Contract-Sweeper PR-intake router. Normalize with scripts/build_spiderweb_spatial_lane.py --input data/intake/pr_intake"
