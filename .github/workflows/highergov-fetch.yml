name: HigherGov fetch

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'YES' (case-insensitive) to confirm fetch"
        required: true
        default: "no"
      confirm_secondary:
        description: "Type 'FETCH' (case-insensitive) to allow actual downloads"
        required: true
        default: "no"

jobs:
  fetch_highergov:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch HigherGov exports
        if: ${{ secrets.HIGHERGOV_API_KEY != '' && startsWith(toLower(github.event.inputs.confirm), 'yes') }}
        env:
          HIGHERGOV_API_KEY: ${{ secrets.HIGHERGOV_API_KEY }}
        run: |
          echo "Starting HigherGov fetch..."
          python3 scripts/fetch_highergov_api.py

      - name: Upload HigherGov exports artifact
        if: ${{ secrets.HIGHERGOV_API_KEY != '' && startsWith(toLower(github.event.inputs.confirm), 'yes') }}
        uses: actions/upload-artifact@v7
        with:
          name: highergov-exports
          path: data/staging/expansion
