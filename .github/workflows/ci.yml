name: Contract Sweeper CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  compile-and-test:
    name: Compile and pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate federation manifest
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path('federation.json').read_text())
          required = {
              'schema_version',
              'program_id',
              'repository_full_name',
              'hub_parent',
              'hub_callable_commands',
              'canonical_outputs',
              'federation_readiness_gate',
          }
          missing = sorted(required - set(manifest))
          if missing:
              raise SystemExit(f'missing federation manifest keys: {missing}')
          if manifest['program_id'] != 'moneysweep-pr':
              raise SystemExit(f"unexpected program_id: {manifest['program_id']}")
          if manifest['hub_parent'] != 'thehub-pr':
              raise SystemExit(f"unexpected hub_parent: {manifest['hub_parent']}")
          commands = manifest['hub_callable_commands']
          for key in ('setup', 'strict_preflight', 'full_pipeline', 'test_suite'):
              if key not in commands:
                  raise SystemExit(f'missing hub command: {key}')
          gate = manifest['federation_readiness_gate']
          if gate.get('ready_for_hub_discovery') is not True:
              raise SystemExit('ready_for_hub_discovery must be true')
          if not isinstance(gate.get('blocking_conditions'), list):
              raise SystemExit('blocking_conditions must be a list')
          PY

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile modules
        run: python -m compileall contract_sweeper scripts tests

      - name: Run tests
        run: pytest -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

      - name: Scan for committed secrets
        run: python scripts/scan_for_secrets.py --root .

      - name: Run R5 validation gates (bootstrap mode)
        run: python -m contract_sweeper.runtime.validation_gates --root . --allow-failed

      - name: Validate Canonical Entity Relationship Model v1 (bootstrap mode)
        run: python -m contract_sweeper.validation.canonical_v1_schema --root . --allow-failed
