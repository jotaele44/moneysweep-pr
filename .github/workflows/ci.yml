name: Contract Sweeper CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  compile-and-test:
    name: Compile and pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile modules
        run: python -m compileall contract_sweeper scripts tests

      - name: Run tests
        run: pytest -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

      - name: Scan for committed secrets
        run: python scripts/scan_for_secrets.py --root .

      - name: Run R5 validation gates (bootstrap mode)
        run: python -m contract_sweeper.runtime.validation_gates --root . --allow-failed
