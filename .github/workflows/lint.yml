name: Lint

# Gating: the tree is clean under the configured rule set (see pyproject.toml
# [tool.ruff]), so this check blocks merges on new lint regressions. The
# adoption was staged per docs/BUILD_EXECUTION_SEQUENCE.md (Wave A introduced it
# report-only; Wave B cleaned the backlog and flipped it gating here).
on: [push, pull_request]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev tooling
        run: pip install -r requirements-dev.txt

      - name: Run ruff lint
        run: ruff check --output-format=github .

      - name: Run ruff format check
        run: ruff format --check .
