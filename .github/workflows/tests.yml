name: Tests

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Federation manifest gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("federation.json").read_text())
          required = {
              "schema_version",
              "program_id",
              "repository_full_name",
              "federation_role",
              "hub_parent",
              "hub_callable_commands",
              "canonical_outputs",
              "federation_readiness_gate",
          }
          missing = sorted(required - set(manifest))
          assert not missing, f"federation.json missing required keys: {missing}"
          assert manifest["schema_version"] == "repo_federation_manifest_v1"
          assert manifest["program_id"] == "moneysweep-pr"
          assert manifest["hub_parent"] == "thehub-pr"
          commands = manifest["hub_callable_commands"]
          assert "setup" in commands and "test_suite" in commands
          gate = manifest["federation_readiness_gate"]
          assert isinstance(gate.get("ready_for_hub_discovery"), bool)
          assert isinstance(gate.get("ready_for_hub_live_execution"), bool)
          assert isinstance(gate.get("blocking_conditions"), list)
          print("federation manifest gate passed")
          PY

      - name: Run tests
        run: python -m pytest tests/ -v
